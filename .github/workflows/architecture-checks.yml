name: Architecture Checks

permissions:
  contents: read

# Four-layer enforcement:
#   Layer 1: cargo-deny — checks advisories, bans, licenses, and sources
#   Layer 2: rust_arkitect — inspects actual `use` statements for boundary violations
#   Layer 3: no-string-interpolation-sql — forbids dynamic SQL construction in repository adapters
#   Layer 4: gitleaks — blocks accidental secret commits against 150+ patterns
#
# See backend/AGENTS.md § Testing & Guardrails and § Security
# See backend/docs/architecture/adrs/ADR-017-architecture-testing-strategy.md

on:
  pull_request:
    paths:
      - "backend/crates/**"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - "backend/deny.toml"
      - ".gitleaks.toml"
      - ".github/workflows/architecture-checks.yml"
  workflow_dispatch:

jobs:
  cargo-deny:
    name: cargo-deny (advisories + bans + licenses + sources)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install and run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check bans advisories licenses sources
          manifest-path: backend/Cargo.toml

  no-string-interpolation-sql:
    name: No string-interpolated SQL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Forbid dynamic SQL string construction in repository adapters
        run: |
          set -e
          # grep for format!/string-concat inside sqlx::query/query_as/query_scalar calls
          #   Pattern A: sqlx::query(format!(...)) or sqlx::query(&format!(...))
          #   Pattern B: sqlx::query("..." + ...) — inline string concatenation
          PATTERNS='sqlx::(query|query_as|query_scalar)\s*\(\s*format!|sqlx::(query|query_as|query_scalar)\s*\(&?format|sqlx::(query|query_as|query_scalar)\s*\([^)]*\+'
          DIR=crates/infra/src/queries
          if grep -rnE "$PATTERNS" "$DIR"; then
            echo "" >&2
            echo "ERROR: dynamic SQL string construction detected in $DIR" >&2
            echo "All sqlx::query(...) / query_as(...) / query_scalar(...) calls must use a static" >&2
            echo "&str literal with \$1-style placeholders. Use .bind() for all dynamic values." >&2
            echo "See backend/AGENTS.md § Security for the complete rule." >&2
            exit 1
          fi
          echo "OK: no string-interpolated SQL found in $DIR"

  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  architecture-tests:
    name: rust_arkitect (source-level rules)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "backend"

      - name: Run architecture tests
        run: cargo test -p architecture_tests
