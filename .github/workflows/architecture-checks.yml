name: Architecture Checks

permissions:
  contents: read

# Two-layer architecture enforcement (ADR-017):
#   Layer 1: cargo-deny — bans forbidden crate dependencies from breakdown_core
#   Layer 2: rust_arkitect — inspects actual `use` statements for boundary violations
#
# See backend/AGENTS.md § Testing & Guardrails and backend/docs/architecture/adrs/ADR-017-architecture-testing-strategy.md

on:
  pull_request:
    paths:
      - "backend/crates/**"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - "backend/deny.toml"
      - ".github/workflows/architecture-checks.yml"
  workflow_dispatch:

jobs:
  cargo-deny:
    name: cargo-deny (dependency bans)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install and run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@b66acf5e9fe20f8aba065be86778a8a4c846f902 # v2
        with:
          command: check bans
          manifest-path: backend/Cargo.toml

  architecture-tests:
    name: rust_arkitect (source-level rules)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: "backend"

      - name: Run architecture tests
        run: cargo test -p architecture_tests
