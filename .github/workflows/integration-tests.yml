name: Integration Tests

on:
  pull_request:
    paths:
      - "backend/crates/core/**"
      - "backend/crates/infra/**"
      - "backend/crates/integration-tests/**"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - ".github/workflows/integration-tests.yml"
  workflow_dispatch:

jobs:
  integration-tests:
    name: Testcontainers Postgres integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Docker is available
        run: |
          docker info
          # This step must fail loudly if Docker is missing. Do not silently
          # pass; missing Docker masks test failures.

      - name: Check production crates do not depend on integration-tests
        run: |
          for pkg in breakdown_core infra api; do
            if cargo tree -p "$pkg" -e normal --depth 1 --prefix none | grep -q '^integration-tests '; then
              echo "ERROR: package '$pkg' depends on integration-tests" >&2
              exit 1
            fi
          done
          echo "OK: no production crate depends on integration-tests"

      - name: Run integration tests
        run: cargo test -p integration-tests

      # If the job becomes too slow for PRs, move this step to a nightly
      # workflow and document the cutoff in backend/AGENTS.md.
