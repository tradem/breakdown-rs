name: Integration Tests

# Tier 1–3: Postgres-only projector/repository tests.
# Tier 4 (ADR-016): full `command → SierraDB → projector → Postgres` round-trip.
# The Tier-4 tests pull `tqwewe/sierradb:0.3.1` via testcontainers in addition to
# the Postgres image, so the only host prerequisite is Docker (or a compatible
# container runtime) with network access to Docker Hub. See
# `backend/AGENTS.md` § Integration tests and `backend/docs/operations/runbooks.md`.

on:
  pull_request:
    paths:
      - "backend/crates/core/**"
      - "backend/crates/infra/**"
      - "backend/crates/api/**"
      - "backend/crates/test_support/**"
      - "backend/crates/integration-tests/**"
      - "backend/Cargo.toml"
      - "backend/Cargo.lock"
      - ".github/workflows/integration-tests.yml"
  workflow_dispatch:

jobs:
  integration-tests:
    name: Testcontainers integration tests (Postgres + SierraDB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Docker is available
        run: |
          docker info
          # This step must fail loudly if Docker is missing. Do not silently
          # pass; missing Docker masks test failures. The Tier-4 tests also
          # pull `tqwewe/sierradb:0.3.1`, so Docker Hub connectivity is required.

      - name: Check production crates do not depend on integration-tests
        run: |
          for pkg in breakdown_core infra api; do
            if cargo tree -p "$pkg" -e normal --depth 1 --prefix none | grep -q '^integration-tests '; then
              echo "ERROR: package '$pkg' depends on integration-tests" >&2
              exit 1
            fi
          done
          echo "OK: no production crate depends on integration-tests"

      - name: Run integration tests
        env:
          RUST_LOG: info,sierradb=debug,kameo_es=debug
        run: cargo test -p integration-tests -- --nocapture

      # If the job becomes too slow for PRs, move this step to a nightly
      # workflow and document the cutoff in backend/AGENTS.md.
