name: Security Audit

on:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    paths:
      - backend/Cargo.lock
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: backend

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          lockfile: backend/Cargo.lock
