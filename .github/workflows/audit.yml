name: Security Audit

on:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    paths:
      - backend/Cargo.lock
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: backend

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: backend
          # RUSTSEC-2023-0071 ("Marvin Attack", crate `rsa`) is pulled in
          # transitively by `jsonwebtoken`, which we use only for RS256
          # signature *verification* with the IdP public key: no private key is
          # ever held server-side, so the timing key-recovery side-channel does
          # not apply. `rsa` 0.9.x has no patched release. Revisit if we switch
          # JWT libraries or `rsa` publishes a constant-time fix.
          #
          # RUSTSEC-2026-0194 / RUSTSEC-2026-0195 (quick-xml DoS advisories) are
          # pulled in transitively by `opendal` (S3 XML parsing). opendal does
          # not expose the affected API to callers — we only use the S3 service
          # with trusted endpoints. A future opendal update will bump
          # quick-xml past 0.41.0. Revisit when upgrading opendal.
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0194,RUSTSEC-2026-0195
