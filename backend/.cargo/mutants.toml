# Exclude the `integration-tests` crate from mutation testing: it operates on real external
# resources (Docker) and exercises the public API, not the whitebox code surface, so only
# inline `#[cfg(test)]` modules in the other crates are mutated. (This is also cargo-mutants'
# default behaviour, stated here explicitly to document the intent.)
exclude_globs = [
    "crates/integration-tests/**",
]

# Accepted surviving mutants.
#
# Only pure routing/metadata constants (CommandName, EventType, category) and
# API bootstrap functions are excluded here.  Mutating them produces wrong
# constant values but does not affect domain behaviour — the tests that would
# catch them are more like "test the constant is correct" which adds noise for
# no domain benefit.
#
# Every other mutant outside these patterns is a genuine test gap and should be
# fixed by strengthening the corresponding test — not by adding another regex.
exclude_re = [
    # kameo_es routing constants: CommandName → wrong &str
    "command_name -> &'static str with",
    # kameo_es event-type markers: EventType → wrong &str
    "event_type -> &'static str with",
    # Aggregate Entity category strings: category → wrong &str
    "category -> &'static str with",
    # API startup / bootstrap (no behavioural logic)
    "init_otel_tracer",
    "replace main -> Result",
    "routes -> Router",
    "app_router -> Router",
    # Command adapter methods (Scene/Character/Costume/Calculation `*CommandsImpl`) delegate to
    # `kameo_es::CommandService::execute`, which only runs against a live SierraDB event store
    # (Docker). They are covered end-to-end by the Docker-gated `crates/integration-tests` suite,
    # which is excluded from mutation for the same reason; spinning the same containers up inside
    # the mutated infra crate would make every mutant rebuild run them and is not viable. These
    # mutants therefore cannot be killed by fast whitebox unit tests in `infra`.
    "CommandsImpl>::",
    # `version_from_expected` is dead code (`#[expect(dead_code)]`). Its `Empty`-arm deletion is a
    # semantically equivalent mutant: both the explicit `Empty` arm and the catch-all `_` arm map
    # to `AggregateVersion::INITIAL`, so removing the arm does not change behaviour and it cannot
    # be caught by a behavioural test. The other two arms are covered by a unit test. The regex is
    # anchored to `version_from_expected` so it does not accidentally exclude unrelated
    # `ExpectedVersion::Empty` arms elsewhere (e.g. in `.patches/kameo_es`).
    "ExpectedVersion::Empty in version_from_expected",
    # LexicalSortKey::midpoint: the loop-bound `<`→`<=` mutants are behaviour-preserving
    # (the `av[i] == bv[i]` equality guard short-circuits the scan before `i` can ever reach
    # the bound for any valid a<b input), and the `i += 1`→`i *= 1` mutant is an untestable
    # infinite loop (the mutated program never terminates). Both are scoped to this function so
    # unrelated mutants are not affected.
    "replace < with <= in LexicalSortKey::midpoint",
    "replace \\+= with \\*= in LexicalSortKey::midpoint",
]
