[workspace]
resolver = "2"
members = [
    "crates/api",          # OpenAPI / Axum Web-Layer
    "crates/core",         # Domain-Modell, Event-Sourcing-Logik, Ports (Traits)
    "crates/infra",        # PostgreSQL, Event-Store, Adapter
    "crates/architecture"   # Architecture- and Vadliation tests
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Tobias Rademacher <your.email@example.com>"]
license = "AGPL-3.0"

[workspace.dependencies]
# Web & API
axum = "0.8"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Datenbank & Event Sourcing
sqlx = { version = "0.9", features = ["postgres", "runtime-tokio-native-tls", "uuid", "chrono", "json"] }
uuid = { version = "1", features = ["v4", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Logging / Tracing
tracing = "0.1"
tracing-subscriber = "0.3"

# Event Sourcing (ES)
kameo = "0.12"      # Das zugrundeliegende Actor-Framework
kameo_es = { git = "https://github.com/sierra-db/kameo_es", branch = "main", features = ["postgres"] } 
thiserror = "2.0"
anyhow = "1.0"

[workspace.lints.rust]
unsafe_code = "forbid"
edition_mismatch = "warn"