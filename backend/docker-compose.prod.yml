# Production runtime for the two-tier stack (ADR-015 / ADR-016).
#
# Choice recorded in ADR-016: docker-compose (not k8s) for v1. Symmetric with the
# dev surface; upgradeable to k8s later without changing the pinned-tag/policy
# decisions.
#
# Covers: Postgres (read-model projections) + SierraDB (RESP3 event store) with
# pinned tags, persistent named volumes, healthchecks, OpenTelemetry hooks
# (ADR-011), and backup/recovery (see docs/operations/runbooks.md).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Configure via the `.env` file or real env vars before booting the API binary
# (see `services.api.environment`).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-breakdown}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sierradb:
    # Pinned upstream image (ADR-016). SierraDB speaks RESP3 only.
    image: tqwewe/sierradb:0.3.1
    restart: unless-stopped
    command: ["--dir", "/app/data"]
    ports:
      - "${SIERRADB_PORT:-9090}:9090"
    volumes:
      - sierradb_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 9090 -3 PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    # Garage is an S3-compatible object store for costume-photo bytes (ADR-019).
    # Internal-only: no host port mapping; only the API binary reaches it.
    image: dxflrs/garage:v1.0.1
    restart: unless-stopped
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:?GARAGE_ADMIN_TOKEN is required}
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN:-}
    volumes:
      - garage_data:/var/lib/garage
    healthcheck:
      test: ["CMD-SHELL", "garage -c /etc/garage/config.toml status 2>&1 | head -1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      sierradb:
        condition: service_healthy
      garage:
        condition: service_healthy
    environment:
      # App role (DML only) – connects as breakdown_app in production.
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-breakdown}
      # Migrator role (DDL) – connects as breakdown_migrator; used only during
      # boot migration, then the pool is dropped. Falls back to DATABASE_URL.
      # In production, set MIGRATOR_DATABASE_URL as a separate secret.
      MIGRATOR_DATABASE_URL: ${MIGRATOR_DATABASE_URL:-}
      SIERRADB_URL: redis://sierradb:9090/?protocol=resp3
      BIND_ADDR: "0.0.0.0:3000"
      # --- Photo storage (Garage / S3) ---
      S3_ENDPOINT: http://garage:3900
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_BUCKET: ${S3_BUCKET:-costume-photos}
      PHOTO_MAX_SIZE_MB: ${PHOTO_MAX_SIZE_MB:-20}
      PHOTO_GC_ENABLED: ${PHOTO_GC_ENABLED:-true}
      PHOTO_GC_INTERVAL_SECS: ${PHOTO_GC_INTERVAL_SECS:-3600}
      PHOTO_GC_MAX_AGE_SECS: ${PHOTO_GC_MAX_AGE_SECS:-86400}
      PHOTO_GC_BATCH_SIZE: ${PHOTO_GC_BATCH_SIZE:-1000}
      PHOTO_GC_DRY_RUN: ${PHOTO_GC_DRY_RUN:-false}
      # --- OpenTelemetry hooks (ADR-011) ---
      # Enable OTEL export by setting OTEL_EXPORTER_OTLP_ENDPOINT.
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-breakdown-rs}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      RUST_LOG: ${RUST_LOG:-info,breakdown=info,sqlx=warn}
    ports:
      - "${API_PORT:-3000}:3000"

volumes:
  postgres_data:
  sierradb_data:
  garage_data:
