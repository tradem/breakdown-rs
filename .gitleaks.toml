# Gitleaks configuration for Breakdown RS
# Prevents false positives and detects real secrets before they land.
# Documentation: https://gitleaks.io/docs/configuration

[extend]
# Use default gitleaks rules as the base (covers 150+ secret patterns)
useDefault = true

# Global allowlist — paths/regexes/keywords that suppress all rule matches
[allowlist]
# Paths to ignore entirely (regex patterns matched against relative path)
paths = [
    # Test files often contain fake secrets
    ".*_test\\.rs$",
    ".*/tests/.*",
    ".*/testdata/.*",
    ".*/fixtures/.*",
    # Documentation and examples
    ".*\\.md$",
    ".*\\.txt$",
    "docs/.*",
    # Build artifacts
    "target/.*",
    # Cargo configuration (internal paths, no secrets)
    "backend/\\.cargo/.*",
    # AST indexing artifacts (binary)
    "\\.ast-bro/.*",
    # Vendored patches (upstream test code)
    "\\.patches/.*",
    # Configuration examples (not actual secrets)
    ".*\\.example\\..*",
    ".*\\.sample\\..*",
    # Dev-only Docker Compose files (placeholders only)
    "docker-compose.*\\.yml",
    # Frontend (separate repo or handled separately)
    "frontend/.*",
]

# Regex patterns to allowlist (false positives)
regexes = [
    # UUIDs (not secrets, just identifiers)
    '''(?i)[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}''',
    # Example/test API keys (obviously fake)
    '''(?i)(test|fake|dummy|example)[-_]?(key|token|secret|password)['"]?\s*[:=]\s*['"]?[a-z0-9+/=]{8,}''',
    # JWTs in tests/examples (they're examples)
    '''(?i)eyJ(exI|hbGc)[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*''',
]

# Keywords to allowlist
keywords = [
    "fake",
    "dummy",
    "example",
    "test",
    "mock",
]
